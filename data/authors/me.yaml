bio: |

    Our interests encompass the mechanics of advanced materials in all their guises---[mechanical metamaterials](research/mechanicalmetamaterials/)
    , [topological materials](), [active matter]()---and how they can be used to build smarter [soft robots](research/softrobotics).
     Our goal is to design **robotic materials**: soft robots that use collective phenomena
    to achieve functionality without central control. 
  
    **For open postions, see the [positions page!](/positions/)**

